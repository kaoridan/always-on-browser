name: Run Background Browser

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Anti-Detect Browser Driver
      run: |
        python -m pip install --upgrade pip
        pip install undetected-selenium

    - name: Execute Browser Session
      env:
        ALTARE_SESSION: ${{ secrets.ALTARE_SESSION }}
        CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
      run: python bot.py
